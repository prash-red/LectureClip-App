AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: LectureClip Lambda functions (SAM template for local dev)

Globals:
  Function:
    Runtime: python3.13
    Timeout: 30
    Environment:
      Variables:
        BUCKET_NAME: !Ref BucketName
        REGION: !Ref AWS::Region

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, eval, prod]
    Description: Deployment environment — controls the lectureclip-{env}-* function name prefix

  BucketName:
    Type: String
    Default: lectureclip-user-videos-local
    Description: S3 bucket name (use your real dev bucket for presigned URLs to work)

  StateMachineArn:
    Type: String
    Default: ""
    Description: Step Functions audio-transcription state machine ARN

  TranscribeTable:
    Type: String
    Default: lectureclip-transcriptions-local
    Description: DynamoDB table name for transcription job tracking

  EmbeddingModelId:
    Type: String
    Default: "global.cohere.embed-v4:0"
    AllowedValues:
      - "amazon.titan-embed-image-v1"
      - "global.cohere.embed-v4:0"
      - "modal-jina-clip-v2"
    Description: Embedding model — Bedrock Titan, Bedrock Cohere, or self-hosted Modal jina-clip-v2

  ModalEmbeddingUrl:
    Type: String
    Default: ""
    Description: Modal web endpoint URL (required when EmbeddingModelId=modal-jina-clip-v2)

  ChatModelId:
    Type: String
    Default: "us.anthropic.claude-3-5-haiku-20241022-v1:0"
    Description: Bedrock model ID for the chat lambda (any Claude model via Converse API)

  ChatSessionsTable:
    Type: String
    Default: ""
    Description: DynamoDB table name for conversation history (optional — stateless if empty)

Resources:
  VideoUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "lectureclip-${Environment}-video-upload"
      Handler: index.handler
      CodeUri: src/lambdas/video-upload/

  MultipartInitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "lectureclip-${Environment}-multipart-init"
      Handler: index.handler
      CodeUri: src/lambdas/multipart-init/

  MultipartCompleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "lectureclip-${Environment}-multipart-complete"
      Handler: index.handler
      CodeUri: src/lambdas/multipart-complete/

  S3TriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "lectureclip-${Environment}-s3-trigger"
      Handler: index.handler
      CodeUri: src/lambdas/s3-trigger/
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref StateMachineArn

  StartTranscribeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "lectureclip-${Environment}-start-transcribe"
      Handler: index.handler
      CodeUri: src/lambdas/start-transcribe/
      Timeout: 60
      Environment:
        Variables:
          TRANSCRIBE_TABLE: !Ref TranscribeTable
          TRANSCRIPTS_BUCKET: !Ref BucketName

  ProcessTranscribeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "lectureclip-${Environment}-process-transcribe"
      Handler: index.handler
      CodeUri: src/lambdas/process-transcribe/
      Timeout: 60
      Environment:
        Variables:
          TRANSCRIBE_TABLE: !Ref TranscribeTable

  ProcessResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "lectureclip-${Environment}-process-results"
      Handler: index.handler
      CodeUri: src/lambdas/process-results/
      Timeout: 900
      Environment:
        Variables:
          EMBEDDING_MODEL_ID: !Ref EmbeddingModelId
          MODAL_EMBEDDING_URL: !Ref ModalEmbeddingUrl
          # AURORA_CLUSTER_ARN, AURORA_SECRET_ARN, AURORA_DB_NAME, EMBEDDING_DIM
          # are injected by Terraform (requires real Aurora — not for sam local invoke)

  QuerySegmentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "lectureclip-${Environment}-query-segments"
      Handler: index.handler
      CodeUri: src/lambdas/query-segments/
      Timeout: 30
      Environment:
        Variables:
          EMBEDDING_MODEL_ID: !Ref EmbeddingModelId
          MODAL_EMBEDDING_URL: !Ref ModalEmbeddingUrl
          # AURORA_CLUSTER_ARN, AURORA_SECRET_ARN, AURORA_DB_NAME, EMBEDDING_DIM
          # are injected by Terraform (requires real Aurora — not for sam local invoke)

  QuerySegmentsInfoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "lectureclip-${Environment}-query-segments-info"
      Handler: index.handler
      CodeUri: src/lambdas/query-segments-info/
      Timeout: 30
      Environment:
        Variables:
          EMBEDDING_MODEL_ID: !Ref EmbeddingModelId
          MODAL_EMBEDDING_URL: !Ref ModalEmbeddingUrl
          # AURORA_CLUSTER_ARN, AURORA_SECRET_ARN, AURORA_DB_NAME, EMBEDDING_DIM
          # are injected by Terraform (requires real Aurora — not for sam local invoke)

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "lectureclip-${Environment}-chat"
      Handler: index.lambda_handler
      CodeUri: src/lambdas/chat/
      Timeout: 60
      Environment:
        Variables:
          EMBEDDING_MODEL_ID: !Ref EmbeddingModelId
          MODAL_EMBEDDING_URL: !Ref ModalEmbeddingUrl
          CHAT_MODEL_ID: !Ref ChatModelId
          CHAT_SESSIONS_TABLE: !Ref ChatSessionsTable
          BUCKET_NAME: !Ref BucketName
          # AURORA_CLUSTER_ARN, AURORA_SECRET_ARN, AURORA_DB_NAME, EMBEDDING_DIM
          # are injected by Terraform (requires real Aurora — not for sam local invoke)

  DbMigrateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "lectureclip-${Environment}-db-migrate"
      Handler: index.handler
      CodeUri: src/lambdas/db-migrate/
      Timeout: 300
      # Env vars (AURORA_CLUSTER_ARN, AURORA_SECRET_ARN, AURORA_DB_NAME)
      # are injected by Terraform. Invoked once by CI after each deployment
      # (scripts/deploy.sh) — not suitable for sam local invoke.
