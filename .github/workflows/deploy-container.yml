name: Deploy Container

on:
  push:
    branches: [main, develop, eval]
    paths:
      - 'src/container/**'

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  # ==========================================================================
  # ENVIRONMENT RESOLUTION — branch determines target environment
  #   develop → dev
  #   main    → prod
  # ==========================================================================
  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.env.outputs.name }}
      role: ${{ steps.env.outputs.role }}
      ecr_repo: ${{ steps.env.outputs.ecr_repo }}
    steps:
      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=prod" >> "$GITHUB_OUTPUT"
            echo "role=${{ vars.AWS_ROLE_TO_ASSUME_PROD }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "eval" ]; then
            echo "name=eval" >> "$GITHUB_OUTPUT"
            echo "role=${{ vars.AWS_ROLE_TO_ASSUME_EVAL }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=dev"  >> "$GITHUB_OUTPUT"
            echo "role=${{ vars.AWS_ROLE_TO_ASSUME_DEV }}" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build & Push (${{ needs.resolve-env.outputs.env_name }})
    runs-on: ubuntu-latest
    needs: resolve-env
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.resolve-env.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: src/container
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/lectureclip-${{ needs.resolve-env.outputs.env_name }}-segment-frame-extractor:latest
            ${{ steps.ecr-login.outputs.registry }}/lectureclip-${{ needs.resolve-env.outputs.env_name }}-segment-frame-extractor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max